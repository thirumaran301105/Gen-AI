# Nginx Configuration for Rural Advisory System
# Production-ready reverse proxy and load balancer

# ============================================
# Upstream Services
# ============================================

upstream api_backend {
    # API servers with load balancing
    server api:8000 weight=1;
    # Add more servers for scaling: server api2:8000; server api3:8000;
    
    # Load balancing method
    least_conn;
    
    # Connection pooling
    keepalive 32;
}

upstream streamlit_app {
    server ui:8501;
    keepalive 32;
}

# ============================================
# Rate Limiting
# ============================================

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=1000r/m;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# ============================================
# HTTP to HTTPS Redirect
# ============================================

server {
    listen 80;
    server_name _;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================
# HTTPS Server
# ============================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name yourdomain.com www.yourdomain.com;
    
    # SSL Certificates
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    
    # SSL Protocol & Ciphers (Modern Configuration)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-CHACHA20-POLY1305;
    
    # SSL Session Cache
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # ============================================
    # Security Headers
    # ============================================
    
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" always;
    
    # Remove server header
    server_tokens off;
    
    # ============================================
    # Logging
    # ============================================
    
    access_log /var/log/nginx/rural_advisory_access.log;
    error_log /var/log/nginx/rural_advisory_error.log warn;
    
    # ============================================
    # Gzip Compression
    # ============================================
    
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml application/atom+xml image/svg+xml 
               text/x-js text/x-component text/x-cross-domain-policy;
    gzip_disable "msie6";
    
    # ============================================
    # API Routes
    # ============================================
    
    location /api/ {
        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn addr 10;
        
        # Proxy settings
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Connection settings
        proxy_set_header Connection "upgrade";
        proxy_set_header Upgrade $http_upgrade;
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # WebSocket support
        proxy_cache_bypass $http_upgrade;
    }
    
    # ============================================
    # Health Check Endpoint
    # ============================================
    
    location /health {
        access_log off;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
    }
    
    # ============================================
    # Metrics & Monitoring (Prometheus)
    # ============================================
    
    location /metrics {
        # Restrict access to internal IPs only
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
    }
    
    # ============================================
    # Streamlit UI
    # ============================================
    
    location / {
        # Rate limiting for UI
        limit_req zone=general_limit burst=50 nodelay;
        
        # Proxy to Streamlit
        proxy_pass http://streamlit_app;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for Streamlit
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # ============================================
    # Static Files & Documentation
    # ============================================
    
    location /docs {
        # Swagger API documentation
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
    }
    
    location /redoc {
        # ReDoc documentation
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
    }
    
    location /openapi.json {
        # OpenAPI schema
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
    }
    
    # ============================================
    # Deny Access to Sensitive Paths
    # ============================================
    
    location ~ /\.env {
        deny all;
    }
    
    location ~ /config/ {
        deny all;
    }
    
    location ~ /\.git/ {
        deny all;
    }
    
    # ============================================
    # 404 Handler
    # ============================================
    
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}

# ============================================
# Monitoring Server (Prometheus, Grafana, etc.)
# ============================================

server {
    listen 9090 ssl http2;
    server_name yourdomain.com;
    
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    
    # Restrict to internal network
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
    
    location / {
        proxy_pass http://prometheus:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 3000 ssl http2;
    server_name yourdomain.com;
    
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    
    # Restrict to internal network
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
    
    location / {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ============================================
# Map for Backend Selection
# ============================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
