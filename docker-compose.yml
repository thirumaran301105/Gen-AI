version: '3.9'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  database:
    image: postgres:15-alpine
    container_name: rural_advisory_db
    environment:
      POSTGRES_USER: ${DB_USER:-rural_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      POSTGRES_DB: ${DB_NAME:-rural_advisory}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployments/postgres_init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rural_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rural_network
    restart: unless-stopped
  
  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: rural_advisory_cache
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rural_network
    restart: unless-stopped
  
  # ============================================
  # FastAPI Backend
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rural_advisory_api
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: postgresql://${DB_USER:-rural_admin}:${DB_PASSWORD:-secure_password_123}@database:5432/${DB_NAME:-rural_advisory}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_123}@redis:6379/0
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WORKERS: 4
      PORT: 8000
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./config:/app/config
      - ./database:/app/database
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - rural_network
    restart: unless-stopped
    command: >
      sh -c "
      echo 'Waiting for database...' &&
      sleep 5 &&
      uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 4 --log-level info
      "
  
  # ============================================
  # Streamlit UI
  # ============================================
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rural_advisory_ui
    environment:
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      STREAMLIT_SERVER_HEADLESS: "true"
      API_URL: http://api:8000
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - rural_network
    restart: unless-stopped
    command: streamlit run app.py --logger.level=info
  
  # ============================================
  # Nginx Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: rural_advisory_nginx
    volumes:
      - ./deployments/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployments/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - ui
    networks:
      - rural_network
    restart: unless-stopped
  
  # ============================================
  # Prometheus Monitoring
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: rural_advisory_prometheus
    volumes:
      - ./deployments/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - rural_network
    restart: unless-stopped
  
  # ============================================
  # Grafana Dashboards
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: rural_advisory_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployments/grafana_dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deployments/grafana_datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - rural_network
    restart: unless-stopped
  
  # ============================================
  # ELK Stack - Elasticsearch
  # ============================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.0
    container_name: rural_advisory_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - rural_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cat/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # ============================================
  # ELK Stack - Logstash
  # ============================================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.5.0
    container_name: rural_advisory_logstash
    volumes:
      - ./deployments/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./logs:/var/log/rural_advisory:ro
    ports:
      - "5000:5000"
    environment:
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - rural_network
    restart: unless-stopped
  
  # ============================================
  # ELK Stack - Kibana
  # ============================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.5.0
    container_name: rural_advisory_kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - rural_network
    restart: unless-stopped

# ============================================
# Networks
# ============================================
networks:
  rural_network:
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local
